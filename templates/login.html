{% extends 'base.html' %}
{% block title %}Entrar | MotorCash{% endblock %}
{% block page_title %}Acesse sua conta{% endblock %}
{% block content %}
<section class="auth-wrap">
    <form class="card form-card" method="post">
        <h2>Entrar</h2>
        <label>E-mail
            <input type="email" name="email" required>
        </label>
        <label>Senha
            <input type="password" name="password" required>
        </label>
        <button class="btn btn-primary" type="submit">Entrar</button>
        <p class="muted">Ainda não tem conta? <a href="{{ url_for('register') }}">Criar conta</a></p>
    </form>
</section>
{% endblock %}
